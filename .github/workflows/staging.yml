name: Pipeline 2 — Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'cmd/**'
      - 'scripts/install.sh'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: staging-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dannut/klist-backend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: cmd
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v6
        with:
          repository: dannut/klist-infra
          ref: staging
          token: ${{ secrets.INFRA_TOKEN }}

      - name: Update image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          (cd k8s/overlays/staging && kustomize edit set image ghcr.io/dannut/klist-backend:staging-${SHORT_SHA})

          git add k8s/overlays/staging/kustomization.yaml
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: update backend image to staging-${SHORT_SHA}"
          git push

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/go.mod
          cache-dependency-path: cmd/go.sum

      - name: Wait for staging
        run: |
          for i in $(seq 1 50); do
            curl -sf https://test.kli.st/api/health && exit 0
            echo "Attempt $i/50 — waiting 10s..."
            sleep 10
          done
          exit 1
          
      # Lasam timp lui Kubernetes sa omoare containerul vechi (remediul pentru eroarea de 404)
      - name: Wait for Kubernetes Rolling Update
        run: sleep 20

      - name: Run integration tests
        working-directory: cmd
        env:
          TEST_BASE_URL: https://test.kli.st
        run: go test -v -count=1 -timeout=120s -tags=integration ./...

  comment-on-failure:
    name: Comment on failure
    runs-on: ubuntu-latest
    needs: [build-push, deploy, integration-tests]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Pipeline 2 esuat — ' + context.sha.substring(0, 7),
              body: '## Pipeline 2 — Staging esuat\n\n' +
                '| Job | Status |\n' +
                '|-----|--------|\n' +
                '| Build & Push | ${{ needs.build-push.result }} |\n' +
                '| Deploy | ${{ needs.deploy.result }} |\n' +
                '| Integration Tests | ${{ needs.integration-tests.result }} |\n\n' +
                '**Commit:** ' + context.sha + '\n' +
                '**Branch:** ' + context.ref,
              labels: ['ci-failure'],
            });