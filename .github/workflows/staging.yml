name: Pipeline 2 — Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: staging-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Autentificare la GitHub Container Registry
      # https://github.com/marketplace/actions/docker-login
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Genereaza tag-urile imaginii — staging-latest si staging-<SHA>
      # https://github.com/marketplace/actions/docker-metadata-action
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dannut/klist-backend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - uses: docker/setup-buildx-action@v3

      # Construieste imaginea Docker si o trimite la GHCR
      # https://github.com/marketplace/actions/build-and-push-docker-images
      - uses: docker/build-push-action@v5
        with:
          context: cmd
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      # Checkout klist-infra pentru a actualiza tag-ul imaginii
      - uses: actions/checkout@v6
        with:
          repository: dannut/klist-infra
          ref: staging
          token: ${{ secrets.INFRA_TOKEN }}

      # Actualizeaza tag-ul imaginii in manifestul de staging
      # ArgoCD detecteaza schimbarea si deployeaza automat
      - - name: Update image tag
        run: |
          # Extragem primele 7 caractere din SHA
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          
          # Folosim variabila SHORT_SHA in comanda sed
          sed -i "s|image: ghcr.io/dannut/klist-backend:.*|image: ghcr.io/dannut/klist-backend:staging-${SHORT_SHA}|g" k8s/staging/04-backend.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/staging/04-backend.yaml
          git commit -m "ci: update backend image to staging-${SHORT_SHA}"
          git push

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/go.mod
          cache-dependency-path: cmd/go.sum

      # Asteapta ca staging-ul sa fie ready inainte de teste
      - name: Wait for staging
        run: |
          for i in $(seq 1 50); do
            curl -sf https://test.kli.st/api/health && exit 0
            echo "Attempt $i/24 — waiting 10s..."
            sleep 10
          done
          exit 1

      # Ruleaza testele de integrare cu DB/Redis/Ollama real din staging
      # Testele cu //go:build integration sunt incluse acum
      - name: Run integration tests
        working-directory: cmd
        env:
          TEST_BASE_URL: https://test.kli.st
        run: go test -v -count=1 -timeout=120s -tags=integration ./...

  comment-on-failure:
    name: Comment on failure
    runs-on: ubuntu-latest
    needs: [build-push, deploy, integration-tests]
    if: failure()
    permissions:
      issues: write
    steps:
      # Creeaza un issue pe GitHub daca pipeline-ul esueaza
      # https://github.com/marketplace/actions/github-script
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Pipeline 2 esuat — ' + context.sha.substring(0, 7),
              body: '## Pipeline 2 — Staging esuat\n\n' +
                '| Job | Status |\n' +
                '|-----|--------|\n' +
                '| Build & Push | ${{ needs.build-push.result }} |\n' +
                '| Deploy | ${{ needs.deploy.result }} |\n' +
                '| Integration Tests | ${{ needs.integration-tests.result }} |\n\n' +
                '**Commit:** ' + context.sha + '\n' +
                '**Branch:** ' + context.ref,
              labels: ['ci-failure'],
            });
