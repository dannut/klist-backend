name: Pipeline 1 — CI

on:
  pull_request:
    branches:
      - staging
      - main

concurrency:
  group: ci-backend-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/go.mod
          cache: true

      # Ruleaza golangci-lint — verifica stilul si erorile de cod Go
      # https://github.com/marketplace/actions/run-golangci-lint
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: cmd

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/go.mod
          cache: true

      # Ruleaza testele unitare fara DB/Redis/Ollama
      # Testele cu //go:build integration sunt excluse automat
      - name: Run unit tests
        working-directory: cmd
        run: go test -v -race -count=1 -timeout=60s ./...

  comment-on-failure:
    name: Comment on failure
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: failure()
    permissions:
      pull-requests: write
    steps:
      # Adauga comentariu pe PR daca lint sau teste esueaza
      # https://github.com/marketplace/actions/create-or-update-comment
      - uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## ❌ Pipeline 1 esuat

            | Job | Status |
            |-----|--------|
            | Lint | ${{ needs.lint.result }} |
            | Unit Tests | ${{ needs.unit-tests.result }} |

            **Commit:** ${{ github.event.pull_request.head.sha }}

            Verifica log-urile pentru detalii.