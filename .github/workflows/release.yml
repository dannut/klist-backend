name: Pipeline 3 — Production 

on:
  # Triggered when Semantic release creates a new tag (e.g. v1.0.0)
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production-backend-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a production release

jobs:

  build-push:
    name: Build & Push Production Image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dannut/klist-backend
          tags: |
            # add "v" for Git compatibility (e.g. v1.0.0):
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            # Always update latest on production
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: cmd
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: production
      url: https://kli.st
    steps:
      - uses: actions/checkout@v6
        with:
          repository: dannut/klist-infra
          ref: main
          token: ${{ secrets.INFRA_TOKEN }}

      - name: Update production image tag & Create PR
        env:
          GH_TOKEN: ${{ secrets.INFRA_TOKEN }}
        run: |
          VERSION=${{ github.ref_name }}

          git checkout -b deploy-backend-${VERSION}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          (cd k8s/overlays/production && kustomize edit set image ghcr.io/dannut/klist-backend:${VERSION})

          sed -i "s/version: \"v[^\"]*\"/version: \"${VERSION}\"/" k8s/overlays/production/app-version.yaml

          git add k8s/overlays/production/kustomization.yaml k8s/overlays/production/app-version.yaml
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: deploy backend ${VERSION} to production"
          git push origin deploy-backend-${VERSION}
          gh pr create --title "Deploy Backend ${VERSION} to production" --body "Automated PR — backend ${VERSION} → production" --base main --head deploy-backend-${VERSION}

  sync-gcp-dr:
    name: Sync GCP-DR after rollout
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - name: Wait for Argo Rollouts to complete
        run: |
          VERSION="${{ github.ref_name }}"
          echo "Waiting 15 minutes for Argo Rollouts analysis to complete..."
          sleep 900
          CURRENT=$(curl -sf https://kli.st/api/version | jq -r '.version' 2>/dev/null || echo "")
          if [ "$CURRENT" != "$VERSION" ]; then
            echo "Rollback detected: current=$CURRENT, expected=$VERSION — aborting GCP-DR sync"
            exit 1
          fi
          echo "Production stable at $VERSION — proceeding with GCP-DR sync"

      - name: Sync GCP-DR via kubectl
        run: |
          VERSION="${{ github.ref_name }}"
          IMAGE="ghcr.io/dannut/klist-backend:${VERSION}"

          echo "${{ secrets.GCP_KUBECONFIG }}" > /tmp/gcp.yaml
          chmod 600 /tmp/gcp.yaml

          kubectl set image deployment/kli-backend kli-backend=${IMAGE} -n kli --kubeconfig /tmp/gcp.yaml
          kubectl rollout status deployment/kli-backend -n kli --kubeconfig /tmp/gcp.yaml --timeout=5m

          rm -f /tmp/gcp.yaml
          echo "GCP-DR synced to backend $VERSION"

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: sync-gcp-dr
    if: success()
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Production Release ' + context.ref.replace('refs/tags/', ''),
              body: '## Production Release Successful\n\n' +
                '**Version:** ' + context.ref.replace('refs/tags/', '') + '\n' +
                '**Commit:** ' + context.sha + '\n' +
                '**URL:** https://kli.st\n\n' +
                'Backend deployed to production successfully.',
              labels: ['release'],
            });

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [build-push, deploy]
    if: failure()
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Production Release FAILED — ' + context.ref.replace('refs/tags/', ''),
              body: '## Pipeline 3 failed\n\n' +
                '| Job | Status |\n' +
                '|-----|--------|\n' +
                '| Build & Push | ${{ needs.build-push.result }} |\n' +
                '| Deploy | ${{ needs.deploy.result }} |\n\n' +
                '**Version:** ' + context.ref.replace('refs/tags/', '') + '\n' +
                '**Commit:** ' + context.sha,
              labels: ['ci-failure', 'release'],
            });
